robot:
  backend: sim

backend:
  sim:
    dt: 0.02
  real:
    # The current Astrall C API does not expose IP setters; these values document
    # the expected network and are used for diagnostics.
    sdk_ip: 10.18.0.200
    robot_ip: 10.18.0.100
    init_timeout_ms: 60000
    command_timeout_ms: 20
    imu_frequency_hz: 250
    sport_frequency_hz: 250
    sdk_quaternion_order: xyzw
    request_control: true

controller:
  max_v: 1.0
  max_w: 1.0
  position_tolerance: 0.1
  angle_tolerance: 0.1

planner:
  type: straight_line
  waypoint_count: 20

camera:
  type: dummy
  width: 640
  height: 480
  channels: 3
  # Real camera config (requires ASTRALL_ENABLE_SDK=ON):
  # type: real
  # udp_url: "udp://0.0.0.0:6000"
  # width: 640
  # height: 480
  # channels: 3

radar:
  type: dummy
  point_count: 1024
